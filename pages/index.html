<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Online Markdown Editor - Vditor</title>
<link rel="stylesheet" href="https://unpkg.com/vditor@3.11.2/dist/index.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  #editor { height: 100vh; }
</style>
</head>
<body>
<div id="editor"></div>
<script src="https://unpkg.com/vditor@3.11.2/dist/index.min.js"></script>
<script>
  const UPLOAD_URL = 'https://vditor-upload.book888.workers.dev';

  new Vditor('editor', {
    height: '100vh',
    mode: 'ir',
    placeholder: '开始写作…',
    theme: 'classic',
    icon: 'ant',
    toolbar: [
      'emoji', 'headings', 'bold', 'italic', 'strike', '|',
      'line', 'quote', 'list', 'ordered-list', 'check', 'outdent', 'indent', '|',
      'code', 'inline-code', 'insert-after', 'insert-before', '|',
      'upload', 'link', 'table', '|',
      'record', 'edit-mode', 'both', 'preview', 'fullscreen', 'outline',
      'code-theme', 'content-theme', 'export', 'devtools', 'info', 'help', 'br'
    ],
    cache: { enable: true, id: 'editor' },
    preview: { mode: 'both' },
    upload: {
      url: UPLOAD_URL,
      fieldName: 'file[]',
      max: 10 * 1024 * 1024
    }
  });
</script>
</body>
</html>
